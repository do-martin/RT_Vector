services:
  # ── Next.js frontend (dev, hot-reload via polling) ──────────────────────
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_DISABLE_TURBOPACK=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ── FastAPI backend (dev, uvicorn --reload) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - models_cache:/app/.model_cache
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/rt_vector
      - SENTENCE_TRANSFORMERS_HOME=/app/.model_cache
      - ENCRYPTION_KEY=bw7ZX0A5TuyU1cT9yONuir7FIVFyeiefs5pnQC1ON4Q=
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rt_vector
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rt_vector"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  models_cache:
  frontend_node_modules:
  frontend_next:
