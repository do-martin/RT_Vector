services:
  # Single pgvector instance — 4 chunking strategies as separate tables
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector_evaluation
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: chunks_evaluation
    ports:
      - "59101:5432"
    volumes:
      - pgvector_evaluation_data:/var/lib/postgresql/data
      - ./init_sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chunks_evaluation"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_evaluation_data:
